server {
    listen 8080;
    server_name localhost;
    root /usr/share/nginx/html;
    index index.html;

    # Never disclose the nginx version (reduces attack surface fingerprinting)
    server_tokens off;

    # Reject oversized request bodies — this is a static site, no uploads needed
    client_max_body_size 1m;

    # Gzip compression for faster asset delivery
    gzip on;
    gzip_comp_level 6;
    gzip_min_length 1024;
    gzip_vary on;
    gzip_proxied any;
    gzip_types text/plain text/css application/json application/javascript application/wasm image/svg+xml text/xml application/xml application/xml+rss text/javascript;

    # Handle SPA routing (always fallback to index.html)
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Cache static assets to save bandwidth
    location ~* \.(?:ico|css|js|gif|jpe?g|png|woff2?|eot|ttf|svg|mp4|webm)$ {
        expires 6M;
        access_log off;
        add_header Cache-Control "public";
    }

    # Security Headers
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Strict-Transport-Security "max-age=63072000; includeSubDomains; preload" always;
    # CSP: scripts are bundled, externally-linked modules only — no inline scripts,
    # so 'unsafe-inline' is intentionally NOT granted to script-src. Tailwind injects
    # an inline <style> tag at runtime, which still requires 'unsafe-inline' for styles.
    add_header Content-Security-Policy "default-src 'self'; script-src 'self'; style-src 'self' 'unsafe-inline'; img-src 'self' data: https:; media-src 'self' https://storage.googleapis.com; connect-src 'self'; font-src 'self' data: https:; object-src 'none'; base-uri 'self'; form-action 'self'; frame-ancestors 'none'; upgrade-insecure-requests;" always;
    add_header Permissions-Policy "geolocation=(), microphone=(), camera=(), payment=(), usb=(), fullscreen=(self)" always;
    add_header Cross-Origin-Opener-Policy "same-origin" always;
    add_header Cross-Origin-Resource-Policy "same-origin" always;
    add_header X-Permitted-Cross-Domain-Policies "none" always;

    # Don't serve hidden/dotfiles (e.g. accidental .env, .git artifacts)
    location ~ /\. {
        deny all;
        return 404;
    }
}
